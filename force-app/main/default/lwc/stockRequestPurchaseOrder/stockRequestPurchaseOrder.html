<template>
    <div class="slds-p-around_small">
        <lightning-button
            variant="brand"
            label="Create Purchase Order"
            icon-name="utility:cart"
            onclick={handleOpen}>
        </lightning-button>
    </div>

    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-modal="true"
                 aria-labelledby="modal-heading-01"
                 class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading-01" class="slds-modal__title slds-hyphenate">
                        Stock Request Details
                    </h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                    <template if:true={isLoading}>
                        <div class="slds-is-relative slds-p-around_large">
                            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                        </div>
                    </template>

                    <template if:false={isLoading}>
                        <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-2 slds-p-vertical_x-small">
                                    <p class="slds-text-title">Stock Request</p>
                                    <p class="slds-text-body_regular slds-text-color_default">
                                        {stockRequestName}
                                    </p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-vertical_x-small">
                                    <p class="slds-text-title">Product Category</p>
                                    <p class="slds-text-body_regular slds-text-color_default">
                                        {productCategory}
                                    </p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-vertical_x-small">
                                    <p class="slds-text-title">Status</p>
                                    <p class="slds-text-body_regular slds-text-color_default">
                                        {status}
                                    </p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-vertical_x-small">
                                    <p class="slds-text-title">Owner</p>
                                    <p class="slds-text-body_regular slds-text-color_default">
                                        {ownerName}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">Stock Request Items</h3>

                        <template if:false={hasItems}>
                            <div class="slds-text-color_weak slds-p-around_medium slds-text-align_center">
                                No items found for this Stock Request.
                            </div>
                        </template>

                        <template if:true={hasItems}>
                            <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_fixed-layout">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th scope="col" style="width:3rem;">
                                            <label class="slds-checkbox">
                                                <input type="checkbox"
                                                       checked={allSelected}
                                                       onchange={handleSelectAll}/>
                                                <span class="slds-checkbox_faux"></span>
                                                <span class="slds-assistive-text">Select All</span>
                                            </label>
                                        </th>
                                        <th scope="col"><div class="slds-truncate" title="Product">Product</div></th>
                                        <th scope="col"><div class="slds-truncate" title="Quantity">Quantity</div></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={items} for:item="item">
                                        <tr key={item.id} class="slds-hint-parent">
                                            <td>
                                                <label class="slds-checkbox">
                                                    <input type="checkbox"
                                                           data-id={item.id}
                                                           checked={item.selected}
                                                           onchange={handleRowToggle}/>
                                                    <span class="slds-checkbox_faux"></span>
                                                    <span class="slds-assistive-text">Select Item</span>
                                                </label>
                                            </td>
                                            <td>
                                                <div class="slds-truncate" title={item.productName}>
                                                    {item.productName}
                                                </div>
                                            </td>
                                            <td>
                                                <div class="slds-truncate" title={item.quantity}>
                                                    {item.quantity}
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </template>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleClose} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button
                        variant="brand"
                        label="Confirm"
                        onclick={handleConfirm}
                        disabled={confirmDisabled}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
