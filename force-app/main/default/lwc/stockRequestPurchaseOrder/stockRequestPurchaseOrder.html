<template>
    <div class="slds-p-around_small">
        <lightning-button
            variant="brand"
            label="Create Purchase Order"
            icon-name="utility:cart"
            onclick={handleOpen}>
        </lightning-button>
    </div>

    <template if:true={showModal}>
        <section role="dialog" tabindex="-1" aria-modal="true"
                 aria-labelledby="modal-heading-01"
                 class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={handleClose}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="modal-heading-01" class="slds-modal__title slds-hyphenate">
                        Stock Request Details
                    </h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                    <template if:true={isLoading}>
                        <div class="slds-is-relative slds-p-around_large">
                            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                        </div>
                    </template>

                    <template if:false={isLoading}>
                        <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                            <div class="slds-grid slds-wrap slds-gutters">
                                <div class="slds-col slds-size_1-of-2 slds-p-vertical_x-small">
                                    <p class="slds-text-title">Stock Request</p>
                                    <p class="slds-text-body_regular slds-text-color_default">
                                        {stockRequestName}
                                    </p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-vertical_x-small">
                                    <p class="slds-text-title">Product Category</p>
                                    <p class="slds-text-body_regular slds-text-color_default">
                                        {productCategory}
                                    </p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-vertical_x-small">
                                    <p class="slds-text-title">Status</p>
                                    <p class="slds-text-body_regular slds-text-color_default">
                                        {status}
                                    </p>
                                </div>
                                <div class="slds-col slds-size_1-of-2 slds-p-vertical_x-small">
                                    <p class="slds-text-title">Owner</p>
                                    <p class="slds-text-body_regular slds-text-color_default">
                                        {ownerName}
                                    </p>
                                </div>
                            </div>
                        </div>

                        <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_medium">
                            <div class="slds-col slds-size_1-of-2">
                                <lightning-combobox
                                    name="branch"
                                    label="Branch"
                                    value={selectedBranch}
                                    placeholder="Select Branch"
                                    options={branchOptions}
                                    required
                                    onchange={handleBranchChange}>
                                </lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-2">
                                <label class="slds-form-element__label" for="vendor-input">Vendor</label>
                                <div class="slds-combobox_container slds-has-inline-listbox">
                                    <div class={vendorDropdownClass}>
                                        <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                                            <input
                                                id="vendor-input"
                                                type="text"
                                                class="slds-input"
                                                placeholder="Search Accounts..."
                                                value={vendorSearchTerm}
                                                oninput={handleVendorInput}
                                                onfocus={handleVendorFocus}
                                                onblur={handleVendorBlur}
                                                autocomplete="off"/>
                                            <span class="slds-icon_container slds-input__icon slds-input__icon_right">
                                                <lightning-icon icon-name="utility:search" size="x-small"></lightning-icon>
                                            </span>
                                        </div>
                                        <template if:true={showVendorResults}>
                                            <div class="slds-dropdown slds-dropdown_length-5 slds-dropdown_fluid" role="listbox">
                                                <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                                                    <template if:true={vendorSearching}>
                                                        <li role="presentation" class="slds-listbox__item slds-text-color_weak slds-p-around_x-small">
                                                            Searching...
                                                        </li>
                                                    </template>
                                                    <template if:true={vendorNoResults}>
                                                        <li role="presentation" class="slds-listbox__item slds-text-color_weak slds-p-around_x-small">
                                                            No accounts found
                                                        </li>
                                                    </template>
                                                    <template for:each={vendorResults} for:item="acct">
                                                        <li key={acct.Id} role="presentation" class="slds-listbox__item">
                                                            <div role="option"
                                                                 class="slds-media slds-listbox__option slds-listbox__option_plain slds-media_small"
                                                                 data-id={acct.Id}
                                                                 data-name={acct.Name}
                                                                 onmousedown={selectVendor}
                                                                 onclick={selectVendor}>
                                                                <span class="slds-media__body">
                                                                    <span class="slds-truncate">{acct.Name}</span>
                                                                </span>
                                                            </div>
                                                        </li>
                                                    </template>
                                                </ul>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <h3 class="slds-text-heading_small slds-m-bottom_x-small">Stock Request Items</h3>

                        <template if:false={hasItems}>
                            <div class="slds-text-color_weak slds-p-around_medium slds-text-align_center">
                                No items found for this Stock Request.
                            </div>
                        </template>

                        <template if:true={hasItems}>
                            <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                                <thead>
                                    <tr class="slds-line-height_reset">
                                        <th scope="col" style="width:3rem;">
                                            <label class="slds-checkbox">
                                                <input type="checkbox"
                                                       checked={allSelected}
                                                       onchange={handleSelectAll}/>
                                                <span class="slds-checkbox_faux"></span>
                                                <span class="slds-assistive-text">Select All</span>
                                            </label>
                                        </th>
                                        <th scope="col"><div class="slds-truncate" title="Product">Product</div></th>
                                        <th scope="col"><div class="slds-truncate" title="Quantity">Quantity</div></th>
                                        <th scope="col"><div class="slds-truncate" title="Price">Price</div></th>
                                        <th scope="col"><div class="slds-truncate" title="Line Total">Line Total</div></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={items} for:item="item">
                                        <tr key={item.id} class="slds-hint-parent">
                                            <td>
                                                <label class="slds-checkbox">
                                                    <input type="checkbox"
                                                           data-id={item.id}
                                                           checked={item.selected}
                                                           onchange={handleRowToggle}/>
                                                    <span class="slds-checkbox_faux"></span>
                                                    <span class="slds-assistive-text">Select Item</span>
                                                </label>
                                            </td>
                                            <td>
                                                <div class="slds-truncate" title={item.productName}>
                                                    {item.productName}
                                                </div>
                                            </td>
                                            <td>
                                                <div class="slds-truncate" title={item.quantity}>
                                                    {item.quantity}
                                                </div>
                                            </td>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    variant="label-hidden"
                                                    data-id={item.id}
                                                    step="0.01"
                                                    min="0"
                                                    value={item.price}
                                                    onchange={handlePriceChange}>
                                                </lightning-input>
                                            </td>
                                            <td>
                                                <lightning-formatted-number
                                                    value={item.lineTotal}
                                                    format-style="decimal"
                                                    minimum-fraction-digits="2"
                                                    maximum-fraction-digits="2">
                                                </lightning-formatted-number>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>

                            <div class="slds-grid slds-grid_align-end slds-p-top_medium slds-text-heading_small">
                                <span class="slds-p-right_small">Total Amount:</span>
                                <strong>
                                    <lightning-formatted-number
                                        value={totalAmount}
                                        format-style="decimal"
                                        minimum-fraction-digits="2"
                                        maximum-fraction-digits="2">
                                    </lightning-formatted-number>
                                </strong>
                            </div>
                        </template>
                    </template>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={handleClose} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button
                        variant="brand"
                        label="Confirm"
                        onclick={handleConfirm}
                        disabled={confirmDisabled}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
