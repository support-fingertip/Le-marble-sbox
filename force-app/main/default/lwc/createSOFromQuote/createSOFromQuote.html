<template>

    
    <!-- ================= CREATE SALES ORDER BUTTON ================= -->
   
    <template if:true={showCreateSOButton}>
         <div class="slds-text-align_center slds-m-top_medium">
        <lightning-button
            variant="brand"
            label="Create Sales Order"
            onclick={handleOpenModal}>
        </lightning-button>
        </div>
    </template>
    

    <!-- ================= MODAL ================= -->
    <template if:true={isModalOpen}>
      <div class={backgroundClass}>
        <section role="dialog" tabindex="-1"
            class="slds-modal slds-fade-in-open slds-modal_large">
            <div class="slds-modal__container">

                <!-- Modal Header -->
                <header class="slds-modal__header gradient-header">
                    <h2 class="slds-text-heading_medium slds-hyphenate slds-text-color_inverse">
                        Sales Order
                    </h2>
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        size="large"
                        variant="inverse"
                        onclick={handleCloseModal}
                        class="slds-modal__close">
                    </lightning-button-icon>
                </header>

                <!-- Modal Body -->
                <div class="slds-modal__content slds-p-around_medium modal-body">

                    <!-- Customer Information -->
                    <div class="customer-card slds-m-bottom_medium">
                        <div class="customer-card-header slds-p-around_small">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <lightning-icon
                                    icon-name="standard:customer"
                                    size="small"
                                    class="slds-m-right_small">
                                </lightning-icon>
                                <div class="slds-col">
                                    <div class="slds-text-heading_small">
                                        Customer Information
                                    </div>
                                </div>
                            </div>
                        </div>

                     


                        <div class="customer-card-body slds-p-around_small">
                            <div class="slds-grid slds-wrap">

                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <div class="slds-text-title">Customer Name</div>
                                    <div>{customerInfo.name}</div>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <div class="slds-text-title">Email</div>
                                    <div>{customerInfo.email}</div>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <div class="slds-text-title">Phone</div>
                                    <div>{customerInfo.phone}</div>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <div class="slds-text-title">Company</div>
                                    <div>{customerInfo.company}</div>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <div class="slds-text-title">Executive Assigned</div>
                                    <div>{customerInfo.executive}</div>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-p-around_x-small">
                                    <div class="slds-text-title">Address</div>
                                    <div>{customerInfo.address}</div>
                                </div>

                            </div>
                        </div>
                    </div>


                       <!-- ================= WAREHOUSE SELECTION ================= -->

                <div class="slds-grid slds-wrap slds-m-bottom_medium slds-grid_vertical-align-center">
                    <div class="slds-col slds-size_1-of-2 slds-p-right_small">
                        <lightning-input
                            type="date"
                            label="Delivery Committed Date"
                            value={deliveryCommittedDate}
                            onchange={handleDeliveryDateChange}
                            required>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-align_absolute-center">
                        <lightning-input
                            type="toggle"
                            label="Credit Order : "
                            label-position="top"
                            checked={credit}
                            message-when-true=""
                            message-when-false=""
                            disabled={isAccountBlocked}
                            onchange={handleCreditToggle}>
                        </lightning-input>
                    <template if:true={isAccountBlocked}>
                        <div class="slds-text-color_error slds-text-body_small slds-m-top_x-small">
                            This is a blocked customer.
                        </div>
                    </template>
                    </div>
                </div>

                    <div class="slds-m-bottom_medium">
                        <lightning-combobox
                            label="Warehouse"
                            placeholder="Select Warehouse"
                            value={selectedWarehouse}
                            options={warehouseOptions}
                            onchange={handleWarehouseChange}
                            required>
                        </lightning-combobox>
                    </div>

                
                <div class="slds-m-bottom_medium">
                <lightning-textarea
                    label="Remarks"
                    value={remarks}
                    onchange={handleRemarksChange}
                    placeholder="Enter remarks">
                </lightning-textarea>
            </div>

                    <!-- ================= PAYMENT SECTION (COMMENTED SAFELY) ================= -->
                    <!--
                    <div class="payment-section slds-m-bottom_medium">
                      <div class="payment-header slds-p-around_small">
                        <div class="slds-grid slds-grid_vertical-align-center">
                          <lightning-icon
                            icon-name="standard:payment_gateway"
                            size="small"
                            class="slds-m-right_small">
                          </lightning-icon>
                          <div class="slds-col">
                            <div class="slds-text-heading_small">
                              Payment Information
                            </div>
                          </div>
                        </div>
                      </div>

                      <div class="payment-body slds-p-around_small">
                        <div class="slds-grid slds-wrap">
                          <div class="slds-col slds-size_1-of-2 slds-p-right_small">
                            <lightning-combobox
                              label="Payment Type"
                              value={selectedPaymentType}
                              options={paymentTypeOptions}
                              onchange={handlePaymentTypeChange}
                              required>
                            </lightning-combobox>

                          <template if:true={showCreditAmount}>
                            <div class="slds-col slds-size_1-of-2 slds-p-left_small">
                              <lightning-input

                                label="Credit Amount"
                                value={creditAmount}
                                onchange={handleCreditAmountChange}
                                step="0.01"
                                min="0"
                                formatter="currency"
                                required>
                              </lightning-input>
                            </div>
                          </template>

                        <template if:true={showCreditDueDate}>

                            <div class="slds-col slds-size_1-of-2 slds-p-right_small">
                              <lightning-input
                                type="date"
                                label="Credit Due Date"

                        </template>
                      </div>

                    -->
                    <!-- ================= END PAYMENT SECTION ================= -->

                    <!-- Quote Items -->
                    <template if:true={hasQuoteItems}>
                        <div class="slds-m-top_medium">
                            <div class="slds-text-heading_small slds-m-bottom_small">
                                Quote Items
                            </div>

                            <div class="table-scroll-wrapper">
                                 <table class="slds-table slds-table_bordered slds-table_cell-buffer slds-table_fixed-layout">
                                    <colgroup>
                                    <col style="width: 6%;">
                                    <col style="width: 30%;">
                                    <col style="width: 9%;">
                                    <col style="width: 9%;">
                                    <col style="width: 9%;">
                                    <col style="width: 9%;">    
                                    <col style="width: 12%;">
                                </colgroup> 
                                    <thead>
                                    <tr>
                                        <th style="width:2%"></th> 
                                        <th>Product</th>
                                        <th>Quantity</th>
                                        <template if:false={isFactoryWarehouse}>
                                            <th>Block Qty</th>
                                        </template>
                                        <th>Unit Price</th>
                                      <!--<th>Tax</th> -->
                                        <th>Total Price</th>
                                        <th>Batch</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={quoteLineItems} for:item="item">
                                        <tr key={item.Id}>
                                        <td>
                                        <lightning-input
                                            type="checkbox"
                                            data-id={item.Id}
                                            checked={item.isSelected}
                                            onchange={handleProductSelection}>
                                        </lightning-input>
                                        </td>
                                            <td class="product-cell">{item.Product2.Name}</td>
                                            <td>{item.Quantity}</td>
                                            <template if:false={isFactoryWarehouse}>
                                            <td>
                                                <lightning-input
                                                    type="number"
                                                    variant="label-hidden"
                                                    value={item.BlockQty}
                                                    data-id={item.Id}
                                                    min="0"
                                                    onchange={handleBlockQtyChange}>
                                                </lightning-input>
                                            </td>
                                        </template>

                                            <td>{item.UnitPrice}</td>
                                      <!--   <td><lightning-formatted-number value={item.tax} minimum-fraction-digits="2" maximum-fraction-digits="2"> </lightning-formatted-number></td>
                                    -->     <td>{item.totalPrice}</td>
                                           <td>
                                                <template if:false={isFactoryWarehouse}>
                                                    <lightning-button
                                                        label="Check Stock"
                                                        variant="brand-outline"
                                                        data-id={item.Id}
                                                        data-code={item.Product2.Product_Code__c}
                                                        onclick={handleViewBatch}>
                                                    </lightning-button>
                                                </template>
                                            </td>

                                        </tr>



   <template if:true={item.batches}>
        <template if:true={item.batches.length}>
            <tr key={item.Id}>
                <td colspan="8" class="slds-p-left_large">

                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-m-top_x-small">
                        <thead>
                            <tr>
                                <th>Warehouse</th>
                                <th>Batch</th>
                                <th>Qty</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={item.batches} for:item="b">
                                <tr key={b.Eid}>
                                    <td>{b.warehouseCode}</td>
                                    <td>{b.Batch}</td>
                                    <td>{b.quantity}</td>
                                    <td>
                                        <lightning-button-icon
                                            icon-name="utility:edit"
                                            variant="bare"
                                            data-qli={item.Id}
                                            data-eid={b.Eid}
                                            onclick={handleEditBatch}>
                                        </lightning-button-icon>

                                        <lightning-button-icon
                                            icon-name="utility:delete"
                                            variant="bare"
                                            data-qli={item.Id}
                                            data-eid={b.Eid}
                                            onclick={handleDeleteBatch}>
                                        </lightning-button-icon>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>

                </td>
            </tr>
        </template>
    </template>


                                    </template>
                                </tbody>
                            </table>
                            </div>  
                        </div>
                    </template>

                    <!-- No Items -->
                    <template if:false={hasQuoteItems}>
                        <template if:true={isQuoteItemsLoaded}>
                            <div class="slds-text-align_center slds-p-around_medium">
                                <lightning-icon icon-name="utility:info" size="medium"></lightning-icon>
                                <p>No items found for this quote.</p>
                            </div>
                        </template>
                    </template>

                </div>

                <!-- Modal Footer -->
                <footer class="slds-modal__footer gradient-footer">
                <button class="cancel-button" onclick={handleCloseModal}>
                    Cancel
                </button>

                <button
                    class="confirm-button"
                    onclick={handleConfirmSale}
                    disabled={isConfirmDisabled}>
                    <lightning-icon
                        icon-name="utility:check"
                        size="x-small"
                        class="slds-m-right_x-small">
                    </lightning-icon>
                    Confirm Sale
                </button>
                </footer>


            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
      </div>
        <template if:true={isBatchModalOpen}>
        <section role="dialog" class="slds-modal slds-fade-in-open slds-modal_medium">
        <div class="slds-modal__container">

        <header class="slds-modal__header">
            <h2 class="slds-text-heading_medium">Batch Details</h2>
        </header>

        <div class="slds-modal__content slds-p-around_medium">

            <table class="slds-table slds-table_bordered slds-table_cell-buffer">
                <thead>
                    <tr>
                        <th>Warehouse</th>
                        <th>Batch</th>
                        <th>Available Qty</th>
                        <th>Billable</th>
                        <th>Reserved</th>
                        <template if:true={isBatchEditable}>
                            <th>Enter Qty</th>
                        </template>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={batchList} for:item="b">
                        <tr key={b.Eid}>
                            <td>{b.warehouseCode}</td>
                            <td>{b.Batch}</td>
                            <td>{b.inStock}</td>
                            <td>
                                <lightning-formatted-number
                                    value={b.billable}
                                    minimum-fraction-digits="2"
                                    maximum-fraction-digits="2">
                                </lightning-formatted-number>
                            </td>
                            <td>
                                <lightning-formatted-number
                                    value={b.reserved}
                                    minimum-fraction-digits="2"
                                    maximum-fraction-digits="2">
                                </lightning-formatted-number>
                            </td>
                        <template if:true={isBatchEditable}>
                            <td>
                                <lightning-input
                                    type="number"
                                    min="0"
                                    data-eid={b.Eid}
                                    value={b.quantity}
                                    onchange={handleBatchQtyChange}>
                                </lightning-input>
                            </td>
                            </template>

                            <template if:false={isBatchEditable}>
                            <td>
                                <lightning-button
                                    label="Select"
                                    variant="brand-outline"
                                    data-warehouse={b.warehouseCode}
                                    onclick={handleWarehouseSelect}>
                                </lightning-button>
                            </td>
                        </template>

                        </tr>
                    </template>
                </tbody>
            </table>

        </div>

        <footer class="slds-modal__footer">
            <lightning-button
                label="Cancel"
                onclick={closeBatchModal}>
            </lightning-button>

            <lightning-button
                label="Save"
                variant="brand"
                onclick={saveBatchItems}>
            </lightning-button>
        </footer>

        </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>




  </template>

    <!-- ================= LOADING SPINNER ================= -->
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

</template>
