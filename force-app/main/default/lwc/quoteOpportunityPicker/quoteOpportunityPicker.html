<template>
    <div class="slds-box slds-theme_default slds-p-around_medium">

        <template lwc:if={showNewOpportunityForm}>
            <div class="slds-text-heading_small slds-m-bottom_x-small">Create New Opportunity</div>
            <template lwc:if={accountName}>
                <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                    Account: <b>{accountName}</b>
                </div>
            </template>

            <lightning-record-edit-form object-api-name="Opportunity"
                                        onsubmit={handleOpportunitySubmit}
                                        onsuccess={handleOpportunityCreated}
                                        onerror={handleOpportunityCreateError}>
                <lightning-messages></lightning-messages>

                <lightning-input type="checkbox"
                                 label="Same as Account Ship Address"
                                 checked={sameAsAccount}
                                 onchange={handleSameAsAccount}
                                 class="slds-m-bottom_small">
                </lightning-input>

                <lightning-input type="text"
                                 label="House Name / No"
                                 data-field="addressLine1"
                                 value={addressLine1}
                                 onchange={handleFieldChange}>
                </lightning-input>
                <lightning-input type="text"
                                 label="Place"
                                 data-field="addressLine2"
                                 value={addressLine2}
                                 onchange={handleFieldChange}>
                </lightning-input>
                <lightning-input type="text"
                                 label="Address Line 3"
                                 data-field="addressLine3"
                                 value={addressLine3}
                                 onchange={handleFieldChange}>
                </lightning-input>

                <div class="slds-grid slds-wrap slds-gutters_x-small">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input type="text"
                                         label="Village"
                                         data-field="village"
                                         value={village}
                                         onchange={handleFieldChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input type="text"
                                         label="Panchayath"
                                         data-field="panchayath"
                                         value={panchayath}
                                         onchange={handleFieldChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input type="text"
                                         label="Municipality"
                                         data-field="municipality"
                                         value={municipality}
                                         onchange={handleFieldChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input type="text"
                                         label="Corporation"
                                         data-field="corporation"
                                         value={corporation}
                                         onchange={handleFieldChange}>
                        </lightning-input>
                    </div>
                </div>

                <div class="slds-grid slds-wrap slds-gutters_x-small">
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input-field field-name="District__c"
                                               value={district}
                                               data-field="district"
                                               onchange={handleFieldChange}>
                        </lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input-field field-name="State__c"
                                               value={state}
                                               data-field="state"
                                               onchange={handleFieldChange}>
                        </lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input-field field-name="Country__c"
                                               value={country}
                                               data-field="country"
                                               onchange={handleFieldChange}>
                        </lightning-input-field>
                    </div>
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input type="number"
                                         label="Pin Code"
                                         data-field="pincode"
                                         value={pincode}
                                         onchange={handleFieldChange}>
                        </lightning-input>
                    </div>
                </div>

                <lightning-input-field field-name="Branch_Location__c"
                                       value={branchLocation}
                                       data-field="branchLocation"
                                       onchange={handleFieldChange}>
                </lightning-input-field>

                <div class="slds-m-top_medium slds-grid slds-grid_align-end">
                    <lightning-button variant="neutral" label="Cancel"
                                      onclick={handleCancelNewOpp}
                                      class="slds-m-right_x-small"></lightning-button>
                    <lightning-button variant="brand" type="submit" label="Save"></lightning-button>
                </div>
            </lightning-record-edit-form>
        </template>

        <template lwc:else>
            <div class="slds-text-heading_small slds-m-bottom_x-small">Select an Opportunity</div>
            <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                Open opportunities for this account.
            </div>

            <template lwc:if={hasOpportunities}>
                <ul class="slds-has-dividers_bottom-space">
                    <template for:each={opportunities} for:item="opp">
                        <li key={opp.Id}
                            class="opp-row slds-item slds-p-around_small"
                            data-id={opp.Id}
                            data-name={opp.Name}
                            onclick={handleOpportunityClick}>
                            <div class="slds-grid slds-grid_align-spread">
                                <div>
                                    <div class="slds-text-body_regular slds-text-link"><b>{opp.Name}</b></div>
                                    <div class="slds-text-body_small slds-text-color_weak">
                                        {opp.StageName}
                                        <template lwc:if={opp.CloseDate}>
                                            &nbsp;&middot;&nbsp;Closes
                                            <lightning-formatted-date-time value={opp.CloseDate}
                                                year="numeric" month="short" day="2-digit">
                                            </lightning-formatted-date-time>
                                        </template>
                                    </div>
                                </div>
                                <template lwc:if={opp.Amount}>
                                    <div class="slds-text-body_regular">
                                        <lightning-formatted-number value={opp.Amount}
                                            format-style="currency">
                                        </lightning-formatted-number>
                                    </div>
                                </template>
                            </div>
                        </li>
                    </template>
                </ul>
            </template>

            <template lwc:elseif={loaded}>
                <div class="slds-text-color_weak slds-p-around_small slds-text-align_center
                            slds-box slds-theme_shade slds-m-bottom_small">
                    No open opportunities for this account. Create a new one below.
                </div>
            </template>

            <div class="slds-m-top_medium">
                <lightning-button label="Create New Opportunity"
                                  icon-name="utility:add"
                                  variant="brand"
                                  onclick={handleShowNewOppForm}
                                  class="full-width-btn">
                </lightning-button>
            </div>
        </template>

    </div>
</template>
