<template>
    <template lwc:if={isLoading}>
        <div class="slds-p-around_medium slds-text-align_center">
            <lightning-spinner alternative-text="Loading quote..." size="small"></lightning-spinner>
        </div>
    </template>

    <template lwc:if={isEditMode}>
        <c-edit-quote record-id={resolvedQuoteId}></c-edit-quote>
    </template>

    <template lwc:if={isNewMode}>
        <c-new-quote-from-opp record-id={recordId}></c-new-quote-from-opp>
    </template>
</template>
